<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의료장비 관리 시스템</title>
  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
  <link rel="stylesheet" href="assets/font/tabler-icons/tabler-icons.min.css">
  <style>
    .auth-tab-bar {
      display: flex; gap: 0; margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
    }
    .auth-tab {
      flex: 1; padding: 10px; border: none; background: none;
      font-size: 14px; font-weight: 600; color: #9ca3af; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .auth-tab.is-active { color: #2563eb; border-bottom-color: #2563eb; }
    .auth-message.is-warn {
      background: #fffbeb; color: #92400e;
      border: 1px solid #fcd34d; border-radius: 6px;
      padding: 8px 12px; font-size: 13px; margin-bottom: 8px;
    }
    .auth-message.is-success {
      background: #f0fdf4; color: #166534;
      border: 1px solid #bbf7d0; border-radius: 6px;
      padding: 8px 12px; font-size: 13px; margin-bottom: 8px;
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-layout">
    <div class="auth-panel">
      <div class="auth-panel-inner">
        <div class="auth-panel-logo"><span>+</span></div>
        <h1 class="auth-panel-title">의료장비<br>관리 시스템</h1>
      </div>
    </div>

    <div class="auth-form-panel">
      <div class="auth-form-wrap">

        <!-- 탭 -->
        <div class="auth-tab-bar">
          <button class="auth-tab" id="tabLogin">로그인</button>
          <button class="auth-tab" id="tabSignup">회원가입</button>
        </div>

        <div id="authMessage" class="auth-message"></div>

        <!-- 로그인 패널 -->
        <div id="panelLogin" class="auth-form">
          <div class="auth-field">
            <label for="userEmail">이메일</label>
            <div class="auth-input-wrap">
              <i class="ti ti-mail"></i>
              <input type="email" id="userEmail" placeholder="이메일 주소" autocomplete="username">
            </div>
          </div>
          <div class="auth-field">
            <label for="userPassword">비밀번호</label>
            <div class="auth-input-wrap">
              <i class="ti ti-lock"></i>
              <input type="password" id="userPassword" placeholder="비밀번호" autocomplete="current-password">
            </div>
          </div>
          <button type="button" class="auth-btn" id="loginBtn">로그인</button>
          <div class="auth-cache-reset">
            <button type="button" id="clearCacheBtn">
              <i class="ti ti-refresh"></i> 접속 문제 · 캐시 초기화
            </button>
          </div>
        </div>

        <!-- 회원가입 패널 -->
        <div id="panelSignup" class="auth-form" style="display:none;">
          <div class="auth-field">
            <label for="signupName">이름</label>
            <div class="auth-input-wrap">
              <i class="ti ti-user"></i>
              <input type="text" id="signupName" placeholder="실명을 입력하세요">
            </div>
          </div>
          <div class="auth-field">
            <label for="signupEmail">이메일</label>
            <div class="auth-input-wrap">
              <i class="ti ti-mail"></i>
              <input type="email" id="signupEmail" placeholder="이메일 주소" autocomplete="username">
            </div>
          </div>
          <div class="auth-field">
            <label for="signupPassword">비밀번호</label>
            <div class="auth-input-wrap">
              <i class="ti ti-lock"></i>
              <input type="password" id="signupPassword" placeholder="6자 이상" autocomplete="new-password">
            </div>
          </div>
          <div class="auth-field">
            <label for="signupPassword2">비밀번호 확인</label>
            <div class="auth-input-wrap">
              <i class="ti ti-lock-check"></i>
              <input type="password" id="signupPassword2" placeholder="비밀번호 재입력" autocomplete="new-password">
            </div>
          </div>
          <button type="button" class="auth-btn" id="signupBtn">가입 신청</button>
          <p style="font-size:12px;color:#9ca3af;text-align:center;margin-top:10px;">
            가입 후 관리자 승인이 필요합니다.
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="assets/libs/supabase.js"></script>
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/supabase.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => auth.initLoginPage());
  </script>
</body>
</html>
