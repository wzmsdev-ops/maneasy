<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 관리</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/libs/ag-grid/ag-grid.min.css" />
  <link rel="stylesheet" href="../../assets/libs/ag-grid/ag-theme-alpine.min.css" />
  <link rel="stylesheet" href="../../assets/css/ag-grid-custom.css" />
  <link rel="stylesheet" href="../../assets/font/tabler-icons/tabler-icons.min.css" />
  <script>
    if (new URLSearchParams(location.search).get('shell') === '1')
      document.documentElement.classList.add('in-shell');
  </script>
  <style>
    html, body { height:100%; margin:0; background:#f0f2f5; }
    .notice-page { display:flex; flex-direction:column; height:100vh; padding:10px 16px; gap:8px; box-sizing:border-box; overflow:hidden; }
    .m-card { background:#fff; border:1px solid #e5e7eb; border-radius:8px; display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
    .m-card-head { display:flex; align-items:center; gap:8px; padding:8px 14px; background:#f8fafc; border-bottom:1px solid #e5e7eb; flex-shrink:0; }
    .m-card-title { font-size:12px; font-weight:700; color:#374151; }
    .m-card-body { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
    .m-table-wrap { flex:1; min-height:0; }
    .m-actionbar { display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:7px 12px; flex-shrink:0; height:44px; box-sizing:border-box; }
    .m-actionbar input[type=text] { flex:1; min-width:0; height:28px; padding:0 10px; border:1px solid #e5e7eb; border-radius:6px; font-size:12px; outline:none; }
    .m-actionbar input[type=text]:focus { border-color:#2563eb; }
    .badge-active   { background:#d1fae5;color:#065f46;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-inactive { background:#f3f4f6;color:#6b7280;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-pin { background:#dbeafe;color:#1d4ed8;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
  </style>
</head>
<body>
<div class="notice-page">

  <div class="m-actionbar">
    <input type="text" id="noticeKeyword" placeholder="제목 검색..." />
    <button class="btn btn-sm btn-primary" id="noticeSearchBtn"><i class="ti ti-search"></i> 조회</button>
    <div style="width:1px;height:20px;background:#d1d5db;margin:0 4px;"></div>
    <button class="btn btn-sm btn-primary" id="noticeAddBtn"><i class="ti ti-plus"></i> 공지 작성</button>
  </div>

  <div class="m-card">
    <div class="m-card-head">
      <span class="m-card-title">공지사항 목록</span>
      <span id="noticeCountLabel" style="font-size:11px;color:#9ca3af;margin-left:4px;"></span>
    </div>
    <div class="m-card-body">
      <div id="noticeGrid" class="m-table-wrap"></div>
    </div>
  </div>

</div>

<!-- 작성/수정 모달 -->
<div id="noticeModal" class="m-modal">
  <div class="m-modal-backdrop" onclick="closeModal('noticeModal')"></div>
  <div class="m-modal-dialog" style="max-width:580px;">
    <div class="m-modal-head">
      <span class="m-modal-title" id="noticeModalTitle">공지 작성</span>
      <button class="m-modal-close" onclick="closeModal('noticeModal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="m-modal-body">
      <div class="form-grid two-col">
        <div class="form-field full-col">
          <label class="form-label required">제목</label>
          <input type="text" id="nf_title" class="input" />
        </div>
        <div class="form-field full-col">
          <label class="form-label required">내용</label>
          <textarea id="nf_content" class="input textarea" rows="5"></textarea>
        </div>
        <div class="form-field">
          <label class="form-label">고정 공지</label>
          <select id="nf_pinned" class="input">
            <option value="false">일반</option>
            <option value="true">고정 공지</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">게시 상태</label>
          <select id="nf_active" class="input">
            <option value="true">게시 중</option>
            <option value="false">숨김</option>
          </select>
        </div>
      </div>
    </div>
    <div class="m-modal-foot">
      <button class="btn btn-sm" onclick="closeModal('noticeModal')">취소</button>
      <button class="btn btn-sm btn-primary" id="noticeSaveBtn">저장</button>
    </div>
  </div>
</div>

<div id="globalLoading" class="is-open">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner"></div>
    <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
  </div>
</div>

<script src="../../assets/libs/ag-grid/ag-grid-community.min.js"></script>
<script src="../../assets/libs/supabase.js"></script>
<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/core/supabase.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/master/notice.js"></script>
</body>
</html>
