<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발주 관리</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/font/tabler-icons/tabler-icons.min.css" />
  <link rel="stylesheet" href="../../assets/libs/ag-grid/ag-grid.min.css" />
  <link rel="stylesheet" href="../../assets/libs/ag-grid/ag-theme-alpine.min.css" />
  <script>
    if (new URLSearchParams(location.search).get('shell') === '1')
      document.documentElement.classList.add('in-shell');
  </script>
  <style>
    html, body { height:100%; margin:0; background:#f0f2f5; }
    .po-page {
      display:flex; flex-direction:column; height:100vh;
      padding:10px 16px; gap:8px; box-sizing:border-box; overflow:hidden;
    }
    /* 액션바 */
    .po-actionbar {
      display:flex; align-items:center; gap:8px; flex-shrink:0;
    }
    .po-actionbar .spacer { flex:1; }
    /* 상태 탭 필터 */
    .po-status-tabs {
      display:flex; gap:4px; flex-shrink:0;
    }
    .po-status-tab {
      height:28px; padding:0 12px; border:1px solid #e5e7eb;
      background:#fff; border-radius:6px; font-size:11px; font-weight:600;
      color:#6b7280; cursor:pointer; transition:all 0.15s;
    }
    .po-status-tab:hover { border-color:#93c5fd; color:#3b82f6; }
    .po-status-tab.active { background:#3b82f6; border-color:#3b82f6; color:#fff; }
    /* 카드 */
    .m-card {
      background:#fff; border:1px solid #e5e7eb; border-radius:8px;
      display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden;
    }
    .m-card-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 14px; background:#f8fafc; border-bottom:1px solid #e5e7eb; flex-shrink:0;
    }
    .m-card-title { font-size:12px; font-weight:700; color:#374151; }
    .m-card-body { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
    .m-table-wrap { flex:1; min-height:0; }
    /* 페이지네이션 */
    .pagination-area { padding:6px 14px; flex-shrink:0; display:flex; justify-content:center; border-top:1px solid #f3f4f6; }
    /* 모달 */
    .m-modal { display:none; position:fixed; inset:0; z-index:500; align-items:center; justify-content:center; }
    .m-modal.is-open { display:flex; }
    .m-modal-backdrop { position:absolute; inset:0; background:rgba(11,22,48,0.45); }
    .m-modal-dialog {
      position:relative; z-index:1; background:#fff; border-radius:8px;
      width:680px; max-width:calc(100vw - 32px); max-height:calc(100vh - 48px);
      display:flex; flex-direction:column;
      box-shadow:0 20px 60px rgba(0,0,0,0.16); border:1px solid #e5e7eb; overflow:hidden;
    }
    .m-modal-dialog--sm { width:440px; }
    .m-modal-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px; background:#0b1630; flex-shrink:0;
    }
    .m-modal-title { font-size:13px; font-weight:700; color:#fff; }
    .m-modal-close {
      width:24px; height:24px; border:none; background:rgba(255,255,255,0.08);
      border-radius:4px; color:rgba(255,255,255,0.6); cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:13px;
    }
    .m-modal-close:hover { background:rgba(255,255,255,0.15); color:#fff; }
    .m-modal-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
    .m-modal-foot {
      display:flex; justify-content:flex-end; gap:6px;
      padding:8px 14px 10px; border-top:1px solid #f3f4f6; background:#f8fafc; flex-shrink:0;
    }
    /* 폼 필드 */
    .m-field { display:flex; flex-direction:column; gap:4px; }
    .m-field label { font-size:11px; font-weight:600; color:#4b5563; }
    .m-field input, .m-field select, .m-field textarea {
      border:1px solid #d1d5db; border-radius:6px; padding:0 8px;
      font-size:12px; outline:none; transition:border-color 0.15s; background:#fff;
    }
    .m-field input, .m-field select { height:32px; }
    .m-field textarea { height:56px; padding:6px 8px; resize:vertical; }
    .m-field input:focus, .m-field select:focus, .m-field textarea:focus { border-color:#3b82f6; }
    .m-field-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .m-field-row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .m-req { color:#ef4444; }
    /* 발주 품목 인라인 테이블 */
    .po-items-table { width:100%; border-collapse:collapse; font-size:12px; }
    .po-items-table th {
      background:#f8fafc; padding:6px 8px; border:1px solid #e5e7eb;
      font-size:11px; font-weight:700; color:#4b5563; text-align:center;
    }
    .po-items-table td { padding:4px 6px; border:1px solid #e5e7eb; }
    .po-items-table td input, .po-items-table td select {
      width:100%; height:28px; border:1px solid #d1d5db; border-radius:4px;
      padding:0 6px; font-size:12px; outline:none; background:#fff; box-sizing:border-box;
    }
    .po-items-table td input:focus, .po-items-table td select:focus { border-color:#3b82f6; }
    .po-items-table .col-del { width:32px; text-align:center; }
    .po-items-table .col-qty { width:80px; }
    .po-items-table .col-price { width:110px; }
    .po-items-table .col-supply { width:110px; }
    .po-items-table .col-unit { width:70px; }
    /* 합계 */
    .po-total-row {
      display:flex; align-items:center; justify-content:flex-end; gap:16px;
      padding:8px 0 2px; font-size:12px; color:#374151;
    }
    .po-total-row strong { font-weight:700; color:#111827; }
    /* 상태 배지 */
    .badge-draft    { background:#f3f4f6;color:#6b7280;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-ordered  { background:#dbeafe;color:#1d4ed8;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-partial  { background:#fef3c7;color:#92400e;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-completed{ background:#d1fae5;color:#065f46;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-cancelled{ background:#fee2e2;color:#991b1b;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    /* AG Grid */
    .ag-theme-alpine {
      --ag-font-size:11px !important;
      --ag-font-family:"Pretendard","Noto Sans KR",sans-serif !important;
      --ag-header-background-color:#f8fafc;
      --ag-header-foreground-color:#4b5563;
      --ag-border-color:#e5e7eb;
      --ag-row-border-color:#f0f0f0;
      --ag-background-color:#fff;
      --ag-odd-row-background-color:#fff;
      --ag-row-hover-color:#f0f5ff;
      --ag-cell-horizontal-padding:8px;
    }
    .ag-theme-alpine .ag-root-wrapper { border-radius:0 0 8px 8px; overflow:hidden; }
    .ag-theme-alpine .ag-body-viewport { overflow-x:hidden !important; overflow-y:auto !important; }
    .ag-theme-alpine .ag-body-horizontal-scroll { display:none !important; }
    .ag-theme-alpine .ag-cell { font-size:11px !important; border-right:1px solid #e5e7eb !important; }
    .ag-theme-alpine .ag-cell:last-child { border-right:none !important; }
    .ag-theme-alpine .ag-header-cell-label { justify-content:center; font-weight:700; }
    .ag-left-header .ag-header-cell-label { justify-content:flex-start !important; }
    .tbl-btn {
      height:22px; padding:0 8px; border:1px solid #d1d5db; background:#fff;
      border-radius:4px; font-size:11px; cursor:pointer; white-space:nowrap;
    }
    .tbl-btn:hover { background:#f9fafb; }
    .tbl-btn--primary { background:#3b82f6; border-color:#3b82f6; color:#fff; }
    .tbl-btn--primary:hover { background:#2563eb; }
    .tbl-btn--danger { border-color:#fca5a5; color:#dc2626; }
    .tbl-btn--danger:hover { background:#fef2f2; }
  </style>
</head>
<body>
<div class="po-page">

  <!-- 액션바 -->
  <div class="po-actionbar">
    <div class="po-status-tabs">
      <button class="po-status-tab active" data-status="">전체</button>
      <button class="po-status-tab" data-status="DRAFT">초안</button>
      <button class="po-status-tab" data-status="ORDERED">발주완료</button>
      <button class="po-status-tab" data-status="PARTIAL">부분입고</button>
      <button class="po-status-tab" data-status="COMPLETED">완료</button>
      <button class="po-status-tab" data-status="CANCELLED">취소</button>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-sm btn-primary" id="addPoBtn"><i class="ti ti-plus"></i> 발주 등록</button>
  </div>

  <!-- 발주 목록 -->
  <div class="m-card">
    <div class="m-card-head">
      <span class="m-card-title">발주 목록</span>
      <span id="poCountLabel" style="font-size:11px;color:#9ca3af;"></span>
    </div>
    <div class="m-card-body">
      <div id="poGrid" class="m-table-wrap"></div>
    </div>
    <div class="pagination-area" id="poPagination"></div>
  </div>

</div>

<!-- ══ 발주 등록/수정 모달 ══ -->
<div id="poModal" class="m-modal">
  <div class="m-modal-backdrop" onclick="closeModal('poModal')"></div>
  <div class="m-modal-dialog">
    <div class="m-modal-head">
      <span class="m-modal-title" id="poModalTitle">발주 등록</span>
      <button class="m-modal-close" onclick="closeModal('poModal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="m-modal-body">
      <!-- 발주 기본 정보 -->
      <div class="m-field-row">
        <div class="m-field">
          <label>발주번호</label>
          <input type="text" id="po_order_no" readonly placeholder="저장 시 자동 생성" style="background:#f8fafc;color:#9ca3af;" />
        </div>
        <div class="m-field">
          <label>발주일 <span class="m-req">*</span></label>
          <input type="date" id="po_order_date" />
        </div>
      </div>
      <div class="m-field-row">
        <div class="m-field">
          <label>거래처 <span class="m-req">*</span></label>
          <select id="po_vendor_id">
            <option value="">거래처 선택</option>
          </select>
        </div>
        <div class="m-field">
          <label>납품 예정일</label>
          <input type="date" id="po_expected_date" />
        </div>
      </div>
      <div class="m-field">
        <label>메모</label>
        <textarea id="po_memo" placeholder="메모"></textarea>
      </div>
      <!-- 품목 -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
        <div style="font-size:11px;font-weight:700;color:#374151;">발주 품목</div>
        <button class="btn btn-sm" id="addPoItemRowBtn" type="button"><i class="ti ti-plus"></i> 품목 추가</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="po-items-table" id="poItemsTable">
          <thead>
            <tr>
              <th style="min-width:160px;">자재명</th>
              <th class="col-unit">입고단위</th>
              <th class="col-qty">수량</th>
              <th class="col-price">단가(공급가)</th>
              <th class="col-supply">공급가액</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody id="poItemsTbody"></tbody>
        </table>
      </div>
      <!-- 합계 -->
      <div class="po-total-row">
        <span>공급가액 합계 <strong id="poTotalSupply">0원</strong></span>
        <span>VAT (10%) <strong id="poTotalVat">0원</strong></span>
        <span>합계 <strong id="poTotalAmount">0원</strong></span>
      </div>
    </div>
    <div class="m-modal-foot">
      <button class="btn btn-sm" onclick="closeModal('poModal')">취소</button>
      <button class="btn btn-sm btn-primary" id="poSaveBtn">저장 (초안)</button>
    </div>
  </div>
</div>

<!-- ══ 발주 상세/상태변경 모달 ══ -->
<div id="poDetailModal" class="m-modal">
  <div class="m-modal-backdrop" onclick="closeModal('poDetailModal')"></div>
  <div class="m-modal-dialog">
    <div class="m-modal-head">
      <span class="m-modal-title" id="poDetailTitle">발주 상세</span>
      <button class="m-modal-close" onclick="closeModal('poDetailModal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="m-modal-body" id="poDetailBody">
    </div>
    <div class="m-modal-foot" id="poDetailFoot">
      <button class="btn btn-sm" onclick="closeModal('poDetailModal')">닫기</button>
    </div>
  </div>
</div>

<div id="globalLoading" aria-hidden="true">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner" aria-hidden="true"></div>
    <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
  </div>
</div>

<script src="../../assets/libs/ag-grid/ag-grid-community.min.js"></script>
<script src="../../assets/libs/supabase.js"></script>
<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/core/supabase.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/master/procurement.js"></script>
</body>
</html>
