<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사인물 신청</title>
  <link rel="stylesheet" href="../../assets/css/common.css" />
  <link rel="stylesheet" href="../../assets/libs/ag-grid/ag-grid.min.css" />
  <link rel="stylesheet" href="../../assets/libs/ag-grid/ag-theme-alpine.min.css" />
  <link rel="stylesheet" href="../../assets/css/ag-grid-custom.css" />
  <link rel="stylesheet" href="../../assets/font/tabler-icons/tabler-icons.min.css" />
  <script>
    if (new URLSearchParams(location.search).get('shell') === '1')
      document.documentElement.classList.add('in-shell');
  </script>
  <style>
    html, body { height:100%; margin:0; background:#f0f2f5; }

    .sr-page {
      display:flex; flex-direction:column; height:100vh;
      padding:10px 16px; gap:8px; box-sizing:border-box; overflow:hidden;
    }

    /* ── 액션바 ── */
    .sr-actionbar {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 7px 12px; flex-shrink: 0; height: 44px; box-sizing: border-box;
    }
    .sr-actionbar input[type=text] {
      flex: 1; min-width: 0;
      height: 28px; padding: 0 10px; border: 1px solid #e5e7eb;
      border-radius: 6px; font-size: 12px; outline: none;
    }
    .sr-actionbar input[type=text]:focus { border-color: #2563eb; }
    .sr-actionbar input[type=date] {
      height: 28px; padding: 0 6px; border: 1px solid #e5e7eb;
      border-radius: 6px; font-size: 12px; outline: none; width: 130px; flex-shrink: 0;
    }
    .sr-actionbar input[type=date]:focus { border-color: #2563eb; }
    .sr-divider { width: 1px; height: 20px; background: #d1d5db; flex-shrink: 0; margin: 0 4px; }

    /* ── 상태 탭 필터 ── */
    .sr-status-tabs { display:flex; gap:3px; flex-shrink:0; flex-wrap:wrap; }
    .sr-status-tab {
      height:28px; padding:0 12px; border:1px solid #e5e7eb;
      background:#fff; border-radius:6px; font-size:11px; font-weight:600;
      color:#6b7280; cursor:pointer; transition:all 0.15s; white-space:nowrap;
    }
    .sr-status-tab:hover { border-color:#93c5fd; color:#3b82f6; }
    .sr-status-tab.active { background:#3b82f6; border-color:#3b82f6; color:#fff; }

    /* ── 카드 ── */
    .m-card {
      background:#fff; border:1px solid #e5e7eb; border-radius:8px;
      display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden;
    }
    .m-card-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 14px; background:#f8fafc; border-bottom:1px solid #e5e7eb; flex-shrink:0;
    }
    .m-card-title { font-size:12px; font-weight:700; color:#374151; }
    .m-card-body  { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
    .m-table-wrap { flex:1; min-height:0; height:calc(100vh - 152px); }
    .pagination-area {
      padding:6px 14px; flex-shrink:0; margin-top:0;
      display:flex; justify-content:center; border-top:1px solid #f3f4f6;
    }

    /* ── 상태 배지 ── */
    .badge-requested  { background:#dbeafe;color:#1d4ed8;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-processing { background:#fef3c7;color:#92400e;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-completed  { background:#d1fae5;color:#065f46;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-rejected   { background:#fee2e2;color:#991b1b;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-cancelled  { background:#f3f4f6;color:#6b7280;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }
    .badge-urgent     { background:#fee2e2;color:#dc2626;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-left:4px; }
    .badge-type       { background:#ede9fe;color:#5b21b6;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:700; }

    /* ── 상세 모달 메타 그리드 ── */
    .sr-detail-meta { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .sr-detail-meta-item { display:flex; flex-direction:column; gap:2px; }
    .sr-detail-meta-item.full { grid-column:1 / -1; }
    .sr-detail-meta-label { font-size:10px; font-weight:700; color:#9ca3af; }
    .sr-detail-meta-value { font-size:12px; font-weight:500; color:#111827; white-space:pre-wrap; }

    /* ── 신청 작성 모달 ── */
    .m-modal .m-modal-dialog--signage { width:760px; max-width:calc(100vw - 32px); max-height:calc(100vh - 48px); }
    .sr-form-body { overflow-y:auto; padding:18px 22px; }

    .sr-type-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
    .sr-type-card {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      padding:18px 10px; border:2px solid #e5e7eb; border-radius:10px;
      cursor:pointer; text-align:center; transition:all 0.15s;
    }
    .sr-type-card:hover { border-color:#93c5fd; }
    .sr-type-card.is-selected { border-color:#2563eb; background:#eff6ff; }
    .sr-type-icon { font-size:26px; }
    .sr-type-title { font-size:13px; font-weight:700; color:#111827; }
    .sr-type-desc { font-size:11px; color:#6b7280; line-height:1.4; }
    .sr-sr-only { position:absolute; opacity:0; width:0; height:0; }

    .sr-section { margin-top:18px; padding-top:14px; border-top:1px solid #f3f4f6; }
    .sr-section-title { font-size:12px; font-weight:800; color:#374151; margin:0 0 10px; }

    .sr-np-type-grid, .sr-np-sub-grid, .sr-method-grid, .sr-layout-grid, .sr-magnet-grid {
      display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-bottom:10px;
    }
    .sr-method-grid, .sr-layout-grid, .sr-magnet-grid { grid-template-columns:repeat(2, 1fr); }
    .sr-np-card, .sr-method-card, .sr-layout-card, .sr-magnet-card {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      padding:10px 6px; border:2px solid #e5e7eb; border-radius:8px;
      cursor:pointer; text-align:center; transition:all 0.15s; font-size:11px;
    }
    .sr-np-card:hover, .sr-method-card:hover, .sr-layout-card:hover, .sr-magnet-card:hover { border-color:#93c5fd; }
    .sr-np-card.is-selected, .sr-method-card.is-selected, .sr-layout-card.is-selected, .sr-magnet-card.is-selected {
      border-color:#2563eb; background:#eff6ff;
    }
    .sr-np-badge { font-size:14px; font-weight:800; color:#2563eb; }
    .sr-np-size  { font-size:10px; color:#6b7280; }
    .sr-method-icon, .sr-magnet-icon { font-size:18px; }
    .sr-method-title, .sr-magnet-title { font-weight:700; color:#111827; }
    .sr-method-desc, .sr-layout-desc { font-size:10px; color:#9ca3af; }
    .sr-layout-shape { font-size:18px; font-weight:800; color:#2563eb; }
    .sr-layout-label { font-weight:700; color:#111827; }

    .sr-np-img-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0; }
    .sr-np-img-wrap img { width:100%; border:1px solid #e5e7eb; border-radius:8px; display:block; }

    .sr-upload-row {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      padding:10px; border:1px dashed #d1d5db; border-radius:8px; background:#fafafa;
    }
    .sr-file-list { display:flex; flex-direction:column; gap:4px; margin-top:8px; }
    .sr-file-item {
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      padding:5px 10px; background:#fff; border:1px solid #e5e7eb; border-radius:6px; font-size:11px;
    }
    .sr-file-item-remove { border:none; background:none; color:#ef4444; cursor:pointer; font-size:13px; }

    .sr-checkbox-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .sr-checkbox-row label { font-size:12px; color:#374151; cursor:pointer; }
  </style>
</head>
<body>
<div class="sr-page">

  <!-- 액션바 -->
  <div class="sr-actionbar">
    <div class="sr-status-tabs">
      <button class="sr-status-tab active" data-status="">전체</button>
      <button class="sr-status-tab" data-status="REQUESTED">접수</button>
      <button class="sr-status-tab" data-status="PROCESSING">진행중</button>
      <button class="sr-status-tab" data-status="COMPLETED">완료</button>
      <button class="sr-status-tab" data-status="REJECTED">반려</button>
      <button class="sr-status-tab" data-status="CANCELLED">취소</button>
    </div>
    <div class="sr-divider"></div>
    <input type="date" id="srDateFrom" />
    <span style="font-size:11px;color:#9ca3af;flex-shrink:0;">~</span>
    <input type="date" id="srDateTo" />
    <div class="sr-divider"></div>
    <input type="text" id="srKeyword" placeholder="제목, 신청번호 검색..." />
    <button class="btn btn-sm btn-primary" id="srSearchBtn"><i class="ti ti-search"></i> 조회</button>
  </div>

  <!-- 목록 그리드 -->
  <div class="m-card">
    <div class="m-card-head">
      <span class="m-card-title">내 사인물 신청 목록</span>
      <span id="srCountLabel" style="font-size:11px;color:#9ca3af;margin-left:8px;"></span>
      <button class="btn btn-sm btn-primary" id="addSrBtn" style="margin-left:auto;"><i class="ti ti-plus"></i> 신청 작성</button>
    </div>
    <div class="m-card-body">
      <div id="srGrid" class="m-table-wrap"></div>
    </div>
    <div class="pagination-area" id="srPagination"></div>
  </div>

</div><!-- /sr-page -->

<!-- ══════════════════════════════════════
     신청 작성 모달
══════════════════════════════════════ -->
<div id="srModal" class="m-modal">
  <div class="m-modal-backdrop" onclick="closeModal('srModal')"></div>
  <div class="m-modal-dialog m-modal-dialog--signage">
    <div class="m-modal-head">
      <span class="m-modal-title"><i class="ti ti-stamp"></i> 사인물 / 명판 제작 신청</span>
      <button class="m-modal-close" onclick="closeModal('srModal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="m-modal-body sr-form-body" style="padding:0;">
      <div style="padding:18px 22px 0;">

        <!-- STEP1: 종류 선택 -->
        <div class="sr-type-grid">
          <label class="sr-type-card" id="srTypeCard_SIGN">
            <input type="radio" name="sr_type" value="SIGN" class="sr-sr-only" />
            <span class="sr-type-icon">🪧</span>
            <span class="sr-type-title">일반 사인물</span>
            <span class="sr-type-desc">배너, 간판, 안내판 등<br>맞춤 제작 사인물</span>
          </label>
          <label class="sr-type-card" id="srTypeCard_NAMEPLATE">
            <input type="radio" name="sr_type" value="NAMEPLATE" class="sr-sr-only" />
            <span class="sr-type-icon">🏷</span>
            <span class="sr-type-title">규격 명판</span>
            <span class="sr-type-desc">A~D 타입 규격 명판<br>사이즈 자동 적용</span>
          </label>
        </div>

        <!-- STEP2: 공통 정보 -->
        <div id="srSectionCommon" class="sr-section" style="display:none;">
          <p class="sr-section-title">기본 정보</p>
          <div class="form-grid two-col">
            <label class="form-field full-col">
              <span class="form-label required">제목</span>
              <input type="text" id="sr_title" class="input" placeholder="제작 종류를 선택하면 안내가 표시됩니다." required />
            </label>
            <label class="form-field">
              <span class="form-label">의원</span>
              <input type="text" id="sr_clinic_display" class="input" readonly />
            </label>
            <label class="form-field">
              <span class="form-label">부서</span>
              <input type="text" id="sr_dept_display" class="input" readonly />
            </label>
            <label class="form-field">
              <span class="form-label required">이름</span>
              <input type="text" id="sr_requester_name" class="input" required />
            </label>
            <label class="form-field">
              <span class="form-label required">연락처</span>
              <input type="tel" id="sr_contact" class="input" placeholder="010-0000-0000" required />
            </label>
            <label class="form-field">
              <span class="form-label required">수량</span>
              <input type="number" id="sr_quantity" class="input" min="1" step="1" value="1" required />
            </label>
            <label class="form-field">
              <span class="form-label">긴급 여부</span>
              <select id="sr_is_urgent" class="input">
                <option value="N">일반</option>
                <option value="Y">🚨 긴급</option>
              </select>
            </label>
            <label class="form-field full-col" id="srUrgentReasonField" style="display:none;">
              <span class="form-label required">긴급 사유</span>
              <input type="text" id="sr_urgent_reason" class="input" />
            </label>
            <label class="form-field full-col">
              <div class="sr-checkbox-row">
                <input type="checkbox" id="sr_draft_confirm" />
                <label for="sr_draft_confirm">시안 제작 후 확인 받고 싶습니다</label>
              </div>
            </label>
          </div>
        </div>

        <!-- STEP3A: 일반 사인물 -->
        <div id="srSectionSign" class="sr-section" style="display:none;">
          <p class="sr-section-title">일반 사인물 상세</p>
          <div class="form-grid two-col">
            <label class="form-field full-col">
              <span class="form-label required">상세내역</span>
              <textarea id="sr_text_content" class="input textarea" rows="3"></textarea>
            </label>
            <label class="form-field">
              <span class="form-label required">사이즈</span>
              <input type="text" id="sr_sign_size" class="input" placeholder="예: 900 × 600 × 5 mm" />
            </label>
            <label class="form-field">
              <span class="form-label required">형태/종류</span>
              <input type="text" id="sr_sign_type" class="input" placeholder="예: 현수막, 아크릴 판넬" />
            </label>
            <label class="form-field full-col">
              <span class="form-label required">설치 환경</span>
              <select id="sr_install_env" class="input">
                <option value="">선택하세요</option>
                <option value="INDOOR">실내</option>
                <option value="OUTDOOR">실외</option>
              </select>
            </label>
            <label class="form-field full-col">
              <span class="form-label required">설치 위치 상세</span>
              <input type="text" id="sr_install_location" class="input" />
            </label>
            <div class="form-field full-col">
              <span class="form-label">첨부파일 (설치위치 사진 등)</span>
              <div class="sr-upload-row">
                <input type="file" id="srFileSign" multiple accept="image/*,.pdf" />
              </div>
              <div class="sr-file-list" id="srFileListSign"></div>
            </div>
          </div>
        </div>

        <!-- STEP3B: 규격 명판 -->
        <div id="srSectionNameplate" class="sr-section" style="display:none;">
          <p class="sr-section-title">명판 타입 선택</p>
          <div class="sr-np-type-grid" id="srNpTypeGrid">
            <label class="sr-np-card" id="srNpCard_A"><input type="radio" name="sr_np_type" value="A" class="sr-sr-only" /><div class="sr-np-badge">A</div><div class="sr-np-size">5cm (20/16)</div></label>
            <label class="sr-np-card" id="srNpCard_B"><input type="radio" name="sr_np_type" value="B" class="sr-sr-only" /><div class="sr-np-badge">B</div><div class="sr-np-size">4cm (20/18)</div></label>
            <label class="sr-np-card" id="srNpCard_C"><input type="radio" name="sr_np_type" value="C" class="sr-sr-only" /><div class="sr-np-badge">C</div><div class="sr-np-size">3cm (20/18)</div></label>
            <label class="sr-np-card" id="srNpCard_D"><input type="radio" name="sr_np_type" value="D" class="sr-sr-only" /><div class="sr-np-badge">D</div><div class="sr-np-size">2.5cm (20)</div></label>
          </div>

          <div id="srNpSubSection" style="display:none;">
            <p class="sr-section-title">세부 디자인 선택</p>
            <div class="sr-np-sub-grid" id="srNpSubGrid"></div>
          </div>

          <div id="srNpImgWrap" class="sr-np-img-wrap" style="display:none;">
            <img id="srNpDesignImg" alt="명판 디자인" />
            <img id="srNpLayoutImg" alt="문구 레이아웃" />
          </div>

          <div id="srMethodSection" style="display:none;">
            <p class="sr-section-title">제작 방식</p>
            <div class="sr-method-grid">
              <label class="sr-method-card" id="srMethodCard_NEW">
                <input type="radio" name="sr_np_method" value="NEW" class="sr-sr-only" />
                <span class="sr-method-icon">🆕</span><span class="sr-method-title">명판 신규 제작</span>
                <span class="sr-method-desc">전체 새로 제작</span>
              </label>
              <label class="sr-method-card" id="srMethodCard_REUSE">
                <input type="radio" name="sr_np_method" value="REUSE" class="sr-sr-only" />
                <span class="sr-method-icon">♻️</span><span class="sr-method-title">기존 명판 활용</span>
                <span class="sr-method-desc">스티커만 교체</span>
              </label>
            </div>
          </div>

          <div id="srLayoutSection" style="display:none;">
            <p class="sr-section-title">문구 레이아웃</p>
            <div class="sr-layout-grid" id="srLayoutGrid"></div>
          </div>

          <div id="srNpTextSection" style="display:none;">
            <p class="sr-section-title">명판 문구</p>
            <div class="form-grid two-col" id="srNpTextFields"></div>

            <p class="sr-section-title" style="margin-top:14px;">자석 부착</p>
            <div class="sr-magnet-grid">
              <label class="sr-magnet-card" id="srMagnetCard_Y">
                <input type="radio" name="sr_magnet" value="Y" class="sr-sr-only" />
                <span class="sr-magnet-icon">🧲</span><span class="sr-magnet-title">있음 (탈부착)</span>
              </label>
              <label class="sr-magnet-card" id="srMagnetCard_N">
                <input type="radio" name="sr_magnet" value="N" class="sr-sr-only" />
                <span class="sr-magnet-icon">📌</span><span class="sr-magnet-title">없음 (고정)</span>
              </label>
            </div>

            <div class="form-field full-col" style="margin-top:10px;">
              <span class="form-label">명판 예시 첨부 (선택)</span>
              <div class="sr-upload-row">
                <input type="file" id="srFileNameplate" multiple accept="image/*,.pdf" />
              </div>
              <div class="sr-file-list" id="srFileListNameplate"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
    <div class="m-modal-foot">
      <button class="btn btn-sm" onclick="closeModal('srModal')">취소</button>
      <button class="btn btn-sm btn-primary" id="srSaveBtn">신청 제출</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     상세 모달
══════════════════════════════════════ -->
<div id="srDetailModal" class="m-modal">
  <div class="m-modal-backdrop" onclick="closeModal('srDetailModal')"></div>
  <div class="m-modal-dialog m-modal-dialog--detail">
    <div class="m-modal-head">
      <span class="m-modal-title" id="srDetailTitle">신청 상세</span>
      <button class="m-modal-close" onclick="closeModal('srDetailModal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="m-modal-body">
      <div class="sr-detail-meta" id="srDetailMeta"></div>
      <div id="srDetailFiles"></div>
    </div>
    <div class="m-modal-foot" id="srDetailFoot">
      <button class="btn btn-sm" onclick="closeModal('srDetailModal')">닫기</button>
    </div>
  </div>
</div>

<div id="globalLoading" aria-hidden="true">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner"></div>
    <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
  </div>
</div>

<script src="../../assets/libs/ag-grid/ag-grid-community.min.js"></script>
<script src="../../assets/libs/supabase.js"></script>
<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/core/supabase.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script src="../../assets/js/core/db.js"></script>
<script src="../../assets/js/signage/request.js"></script>
</body>
</html>
