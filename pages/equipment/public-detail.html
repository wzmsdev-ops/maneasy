<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장비 정보</title>
  <link rel="stylesheet" href="../../assets/font/tabler-icons/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #111827;
      min-height: 100vh;
    }

    /* ── 상단 브랜드 바 ── */
    .pub-header {
      background: #0b1630;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .pub-header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pub-header-logo {
      width: 28px;
      height: 28px;
      background: #2563eb;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }

    .pub-header-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      line-height: 1.3;
    }

    .pub-header-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }

    .pub-login-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .pub-login-btn:hover { background: rgba(255,255,255,0.18); }

    /* ── 본문 ── */
    .pub-body {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── 히어로 카드 ── */
    .pub-hero {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .pub-hero-name {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
      line-height: 1.2;
    }

    .pub-hero-id {
      font-size: 11px;
      color: #9ca3af;
      font-family: Consolas, monospace;
      margin-top: 4px;
    }

    .pub-hero-dept {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pub-hero-badge {
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* 상태 뱃지 */
    .status-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .is-in-use     { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .is-repairing  { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    .is-inspecting { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
    .is-stored     { background: #f9fafb; color: #374151; border-color: #e5e7eb; }
    .is-disposed   { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

    /* ── 공지 배너 ── */
    .pub-notice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 11px;
      color: #1e40af;
      line-height: 1.5;
    }

    .pub-notice i { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    .pub-login-notice {
      background: #fffbeb;
      border-color: #fde68a;
      color: #92400e;
    }

    .pub-login-notice a {
      color: #92400e;
      font-weight: 700;
      text-decoration: underline;
    }

    /* ── 정보 카드 ── */
    .pub-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }

    .pub-card-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
    }

    .pub-card-head i { font-size: 14px; color: #6b7280; }

    /* ── 정보 그리드 ── */
    .pub-info-list {
      display: flex;
      flex-direction: column;
    }

    .pub-info-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 0;
      border-bottom: 1px solid #f3f4f6;
      min-height: 36px;
    }

    .pub-info-row:last-child { border-bottom: none; }

    .pub-info-label {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      background: #f8fafc;
      border-right: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
    }

    .pub-info-value {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      color: #111827;
      display: flex;
      align-items: center;
      word-break: break-word;
    }

    /* ── 상세 보기 버튼 ── */
    .pub-detail-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      background: #0b1630;
      color: #fff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.12s;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    .pub-detail-btn:hover { background: #1e2d4f; }
    .pub-detail-btn i { font-size: 16px; }

    /* ── 로딩 / 에러 ── */
    .pub-loading {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 13px;
    }

    .pub-error {
      text-align: center;
      padding: 40px 20px;
      color: #b91c1c;
      font-size: 13px;
    }

    /* ── 글로벌 로딩 ── */
    #globalLoading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #globalLoading.is-open { display: flex; }
    .global-loading__dialog {
      background: #fff;
      border-radius: 10px;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .global-loading__spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .global-loading__text { font-size: 13px; color: #374151; }
  </style>
</head>
<body>

<header class="pub-header">
  <div class="pub-header-brand">
    <div class="pub-header-logo">+</div>
    <div>
      <div class="pub-header-title">관리이지</div>
      <div class="pub-header-sub">장비 정보 조회</div>
    </div>
  </div>
  <a href="../../index.html" class="pub-login-btn">
    <i class="ti ti-login"></i> 로그인
  </a>
</header>

<div class="pub-body" id="pubBody">
  <div class="pub-loading"><i class="ti ti-loader"></i> 불러오는 중...</div>
</div>

<div id="globalLoading" aria-hidden="true">
  <div class="global-loading__dialog">
    <div class="global-loading__spinner"></div>
    <div class="global-loading__text" id="globalLoadingText">불러오는 중...</div>
  </div>
</div>

<script src="../../assets/libs/supabase.js"></script>
<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/utils.js"></script>
<script src="../../assets/js/core/supabase.js"></script>
<script src="../../assets/js/equipment/public-detail.js"></script>

</body>
</html>
